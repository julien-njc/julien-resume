name: Build Resume PDFs

on:
  push:
    branches:
      - main
    paths:
      - "resume.json"
      - "resume-ats.css"
      - "resume-stylish.css"
      - "Dockerfile"
      - "compose.yaml"
      - "scripts/build_ats_docx.py"
      - "scripts/render_resume.py"
      - "scripts/build-resume.sh"
      - ".github/workflows/release-resume.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build PDF
        run: |
          docker compose build resume-builder
          docker compose run --rm resume-builder

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume_outputs
          path: |
            build/resume_ats.docx
            build/resume_ats.pdf
            build/resume_styled.pdf

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: resume-${{ github.sha }}
          RELEASE_TITLE: Resume build ${{ github.sha }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              "build/resume_ats.docx" \
              "build/resume_ats.pdf" \
              "build/resume_styled.pdf" \
              --clobber
          else
            gh release create "$TAG_NAME" \
              "build/resume_ats.docx" \
              "build/resume_ats.pdf" \
              "build/resume_styled.pdf" \
              --title "$RELEASE_TITLE" \
              --notes "Automated ATS DOCX, ATS PDF, and styled PDF builds for commit $GITHUB_SHA."
          fi
