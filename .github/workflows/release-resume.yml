name: Build Tauri Editor

on:
  push:
    branches:
      - main
    paths:
      - "editor/**"
      - "scripts/**"
      - "Dockerfile"
      - "resume-ats.css"
      - "resume-stylish.css"
      - ".github/workflows/release-resume.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS cross-compile targets (universal binary)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        working-directory: editor
        run: npm install

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: editor
          tagName: editor-v__VERSION__
          releaseName: Resume Editor v__VERSION__
          releaseBody: |
            ## Resume Editor v__VERSION__

            Desktop app for editing `resume.json`, managing job applications, and triggering Docker-based PDF builds.

            | Platform | Installer |
            |---|---|
            | macOS (Apple Silicon + Intel) | `.dmg` |
            | Linux | `.AppImage` · `.deb` |
            | Windows | `.exe` (NSIS) · `.msi` |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
